<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PGCG Inmobiliaria</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>

    <div th:replace="fragments/menu :: menu"></div>

    <div class="contenedor">

        <h1>Formulario de Propiedad</h1>

        <div class="mensaje error"
             th:if="${error}"
             th:text="${error}">
        </div>

        <form th:action="${form.id == null} ? @{/propiedades/guardar} : @{/propiedades/editar}"
              th:object="${form}"
              method="post">

            <input type="hidden"
                   th:field="*{id}">

            <div th:if="${form.id != null}">

                <label>Identificador</label>

                <input type="text"
                       th:value="${form.id}"
                       readonly>

            </div>

            <label>Dirección</label>

            <input type="text"
                   th:field="*{direccion}">

            <label>Ciudad</label>

            <select th:field="*{ciudadId}">
                <option th:each="c : ${ciudades}"
                        th:value="${c.id}"
                        th:text="${c.nombre}">
                </option>
            </select>

            <label>Tipo</label>

            <select th:field="*{tipo}">
                <option th:each="t : ${tipos}"
                        th:value="${t}"
                        th:text="${t}">
                </option>
            </select>

            <label>Ambientes</label>

            <input type="number"
                   th:field="*{cantidadAmbientes}">

            <label>M²</label>

            <input type="number"
                   step="0.01"
                   th:field="*{metrosCuadrados}">

            <label>Descripción</label>

            <textarea th:field="*{descripcion}">
            </textarea>

            <label>Comodidades (opcional)</label>

            <textarea th:field="*{comodidades}">
            </textarea>

            <label>Estado</label>

            <select th:field="*{estadoDisponibilidad}">
                <option th:each="e : ${estados}"
                        th:value="${e}"
                        th:text="${e}">
                </option>
            </select>

            <label>Propietario</label>

            <select th:field="*{propietarioId}">
                <option th:each="p : ${personas}"
                        th:value="${p.id}"
                        th:text="${p.nombreCompleto}">
                </option>
            </select>

            <div class="acciones-form">

                <button type="submit">
                    Guardar
                </button>

                <a class="boton"
                   th:href="@{/propiedades}">
                    Volver
                </a>

            </div>

        </form>

    </div>

</body>

</html>
