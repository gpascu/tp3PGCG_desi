<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PGCG Inmobiliaria</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>

    <div th:replace="fragments/menu :: menu"></div>

    <div class="contenedor">

        <h1>Formulario de Factura</h1>

        <div class="mensaje error"
             th:if="${error}"
             th:text="${error}">
        </div>

        <form th:action="${form.id == null} ? @{/facturas/guardar} : @{/facturas/editar}"
              th:object="${form}"
              method="post">

            <input type="hidden"
                   th:field="*{id}">

            <label>Contrato</label>

            <select th:if="${form.id == null}"
                    th:field="*{contratoId}">
                <option value="">Seleccione un contrato activo</option>
                <option th:each="c : ${contratos}"
                        th:value="${c.id}"
                        th:text="${'#' + c.id + ' - ' + (c.propiedad != null ? c.propiedad.direccion : '') + ' / ' + (c.inquilino != null ? c.inquilino.nombreCompleto : '')}">
                </option>
            </select>

            <span th:if="${form.id != null}"
                  th:text="${contratoActual != null ? '#' + contratoActual.id + ' - ' + (contratoActual.propiedad != null ? contratoActual.propiedad.direccion : '') + ' / ' + (contratoActual.inquilino != null ? contratoActual.inquilino.nombreCompleto : '') : ''}">
            </span>

            <input type="hidden"
                   th:if="${form.id != null}"
                   th:field="*{contratoId}">

            <label>Período facturado</label>

            <input type="month"
                   th:field="*{periodoFacturado}">

            <label>Fecha de emisión</label>

            <input type="date"
                   th:field="*{fechaEmision}">

            <label>Fecha de vencimiento</label>

            <input type="date"
                   th:field="*{fechaVencimiento}">

            <label>Importe</label>

            <input type="number"
                   step="0.01"
                   th:field="*{importe}">

            <label>Estado</label>

            <select th:field="*{estado}">
                <option th:each="e : ${estados}"
                        th:value="${e}"
                        th:text="${e}">
                </option>
            </select>

            <h3>Datos de pago (solo si la factura está pagada)</h3>

            <label>Fecha de pago</label>

            <input type="date"
                   th:field="*{fechaPago}">

            <label>Medio de pago</label>

            <select th:field="*{medio}">
                <option value="">Sin especificar</option>
                <option th:each="m : ${medios}"
                        th:value="${m}"
                        th:text="${m}">
                </option>
            </select>

            <label>Importe pagado</label>

            <input type="number"
                   step="0.01"
                   th:field="*{importePagado}">

            <div class="acciones-form">

                <button type="submit">
                    Guardar
                </button>

                <a class="boton"
                   th:href="@{/facturas}">
                    Volver
                </a>

            </div>

        </form>

    </div>

</body>

</html>
