<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PGCG Inmobiliaria</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>

    <div th:replace="fragments/menu :: menu"></div>

    <div class="contenedor">

        <h1>Registrar pago de factura</h1>

        <div class="mensaje error"
             th:if="${error}"
             th:text="${error}">
        </div>

        <table class="tabla-responsive">
            <tr>
                <th>Factura</th>
                <th>Concepto</th>
                <th>Vencimiento</th>
                <th>Importe</th>
                <th>Estado</th>
            </tr>
            <tr>
                <td th:text="${'#' + factura.id}"></td>
                <td th:text="${factura.conceptoFacturado}"></td>
                <td th:text="${factura.fechaVencimiento}"></td>
                <td th:text="${factura.importe}"></td>
                <td th:text="${factura.estado}"></td>
            </tr>
        </table>

        <form th:action="@{/facturas/pagar}" method="post">

            <input type="hidden" name="id" th:value="${factura.id}">

            <label>Fecha de pago</label>
            <input type="date" name="fechaPago" required>

            <label>Medio de pago</label>
            <select name="medio" required>
                <option value="">Seleccione un medio</option>
                <option th:each="m : ${medios}"
                        th:value="${m}"
                        th:text="${m}">
                </option>
            </select>

            <label>Importe pagado</label>
            <input type="number" step="0.01" name="importePagado" required>

            <label>Interés pagado (opcional)</label>
            <input type="number" step="0.01" name="interes">

            <div class="acciones-form">
                <button type="submit">Registrar pago</button>
                <a class="boton" th:href="@{/facturas}">Volver</a>
            </div>

        </form>

    </div>

</body>

</html>
