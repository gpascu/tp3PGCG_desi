<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PGCG</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>
<div th:replace="fragments/menu :: menu"></div>

<div class="contenedor">
<h1>Publicaciones</h1>
<div class="mensaje ok" th:if="${ok}" th:text="${ok}"></div>
<div class="mensaje error" th:if="${error}" th:text="${error}"></div>

<form method="get" th:object="${formBusqueda}">
    <input type="number" th:field="*{id}" placeholder="ID">
    
    <select th:field="*{estado}">
        <option value="">Estado</option>
        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
    </select>
    
    <button type="submit">Buscar</button>
    <a class="boton" th:href="@{/publicaciones/nuevo}">Nueva publicación</a>
</form>

<table>
    <tr>
        <th>ID</th>
        <th>Propiedad (Dirección)</th>
        <th>Fecha Pub.</th>
        <th>Precio Mensual</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    <tr th:each="p : ${lista}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.propiedad != null ? p.propiedad.direccion : '-'}"></td>
        <td th:text="${p.fechaPublicacion != null} ? ${#temporals.format(p.fechaPublicacion, 'dd/MM/yyyy')} : '-'"></td>
        <td th:text="${'$ ' + p.precioMensual}"></td>
        <td th:text="${p.estado}"></td>
		<td>
		    <a class="boton" th:href="@{/publicaciones/editar/{id}(id=${p.id})}">Editar</a>

		    <form th:action="@{/publicaciones/eliminar/{id}(id=${p.id})}" method="post" style="display:inline;"
		          onclick="return confirm('¿Está seguro de dar de baja esta publicación?');">
		        <button type="submit">Eliminar</button>
		    </form>
		</td>
		    
    </tr>
</table>
</div>

</body>
</html>
