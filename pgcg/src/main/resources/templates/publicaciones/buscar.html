<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PGCG - Listado de Publicaciones</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>
    <div th:replace="fragments/menu :: menu"></div>

    <div class="contenedor" style="max-width: 90%; margin-top: 30px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Gestión de Publicaciones</h1>
            <a th:href="@{/publicaciones/nuevo}" class="boton" style="text-decoration: none;">Nueva Publicación</a>
        </div>
        
        <div class="mensaje error" th:if="${error}" th:text="${error}"></div>

        <table class="tabla" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
            <thead>
                <tr style="background-color: #f2f2f2; text-align: left;">
                    <th style="padding: 12px; border-bottom: 2px solid #ddd;">ID</th>
                    <th style="padding: 12px; border-bottom: 2px solid #ddd;">Descripción</th>
                    <th style="padding: 12px; border-bottom: 2px solid #ddd;">Fecha Publicación</th>
                    <th style="padding: 12px; border-bottom: 2px solid #ddd;">Precio Mensual</th>
                    <th style="padding: 12px; border-bottom: 2px solid #ddd;">Estado</th>
                    <th style="padding: 12px; border-bottom: 2px solid #ddd; text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="pub : ${listaPublicaciones}" style="border-bottom: 1px solid #ddd;">
                    <td th:text="${pub.id}" style="padding: 12px;"></td>
                    <td th:text="${pub.descripcion}" style="padding: 12px;"></td>
                    <td th:text="${pub.fechaPublicacion != null} ? ${#temporals.format(pub.fechaPublicacion, 'dd/MM/yyyy')} : '-'" style="padding: 12px;"></td>
                    <td th:text="${'$ ' + pub.precioMensual}" style="padding: 12px;"></td>
                    <td style="padding: 12px;">
                        <span th:text="${pub.estado}" 
                              th:style="'font-weight: bold; color: ' + (${pub.estado.name() == 'ACTIVA'} ? 'green' : (${pub.estado.name() == 'PAUSADA'} ? 'orange' : 'red'))">
                        </span>
                    </td>
                    <td style="padding: 12px; text-align: center;">
                        <a th:href="@{/publicaciones/eliminar/{id}(id=${pub.id})}" 
                           class="boton" 
                           style="background-color: #d9534f; padding: 5px 10px; font-size: 0.85em; text-decoration: none;"
                           onclick="return confirm('¿Está seguro de dar de baja esta publicación?');">
                           Dar de Baja
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listaPublicaciones)}">
                    <td colspan="6" style="text-align: center; padding: 20px; color: #777; font-style: italic;">
                        No se encontraron publicaciones registradas en el sistema.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
