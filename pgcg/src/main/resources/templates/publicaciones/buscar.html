<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PGCG</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>
<div th:replace="fragments/menu :: menu"></div>

<div class="contenedor">
<h1>Publicaciones</h1>
<div class="mensaje ok" th:if="${ok}" th:text="${ok}"></div>
<div class="mensaje error" th:if="${error}" th:text="${error}"></div>

<form method="get" th:object="${formBusqueda}">
    <select th:field="*{propiedadId}">
        <option value="">Propiedad</option>
        <option th:each="p : ${propiedades}" th:value="${p.id}" th:text="${p.direccion}"></option>
    </select>

    <select th:field="*{ciudadId}">
        <option value="">Ciudad</option>
        <option th:each="c : ${ciudades}" th:value="${c.id}" th:text="${c.nombre}"></option>
    </select>

    <select th:field="*{estado}">
        <option value="">Estado</option>
        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
    </select>

    <input type="number" step="0.01" th:field="*{precioMin}" placeholder="Precio desde">
    <input type="number" step="0.01" th:field="*{precioMax}" placeholder="Precio hasta">

    <button type="submit">Buscar</button>
    <a class="boton nuevoItem" th:href="@{/publicaciones/nuevo}">Nueva publicación</a>
</form>

<table>
    <tr>
        <th>ID</th>
        <th>Propiedad (Dirección)</th>
        <th>Ciudad</th>
        <th>Fecha Pub.</th>
        <th>Precio Mensual</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    <tr th:each="p : ${lista}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.propiedad != null ? p.propiedad.direccion : '-'}"></td>
        <td th:text="${p.propiedad != null and p.propiedad.ciudad != null ? p.propiedad.ciudad.nombre : '-'}"></td>
        <td th:text="${p.fechaPublicacion != null ? #temporals.format(p.fechaPublicacion, 'dd/MM/yyyy') : '-'}"></td>
        <td th:text="${'$ ' + p.precioMensual}"></td>
        <td th:text="${p.estado}"></td>
        <td>
            <div class="acciones">
                	<div class="accion-item">
					<a class="boton boton-historial"
					   th:href="@{/publicaciones/{id}/historial-estados(id=${p.id})}"
					   title="Historial de estados">
						<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: block;">
							<circle cx="12" cy="12" r="10"></circle>
							<polyline points="12 6 12 12 16 14"></polyline>
						</svg>
					</a>
					</div>
					<div class="accion-item">
                    <a class="boton boton-editar" th:href="@{/publicaciones/editar/{id}(id=${p.id})}">Editar</a>					
               		 </div>				
					<div class="accion-item">
                    <form th:action="@{/publicaciones/eliminar/{id}(id=${p.id})}" method="post"
                          onclick="return confirm('¿Está seguro de dar de baja esta publicación?');">
                        <button type="submit" class="boton-eliminar">Eliminar</button>
                    </form>
                </div>
            </div>
        </td>
    </tr>
</table>
</div>

</body>
</html>
