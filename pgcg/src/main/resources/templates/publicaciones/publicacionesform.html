<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PGCG - Formulario de Publicaciones</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>
    <div th:replace="fragments/menu :: menu"></div>

    <div class="contenedor">
        <h1>Formulario de Publicaciones</h1>
        
        <div class="mensaje error" th:if="${error}" th:text="${error}"></div>
        
        <form th:action="@{/publicaciones/guardar}" th:object="${publicacionesform}" method="post">
            
            <input type="hidden" th:field="*{id}">
            
            <div th:if="*{id != null}">
                <label>Identificador</label>
                <input type="text" th:field="*{id}" readonly>
            </div>
            
            <label>Descripción</label>
            <textarea th:field="*{descripcion}"></textarea>
            
            <label>Fecha de Publicación</label>
            <input type="date" th:field="*{fechaPublicacion}">
            
            <label>Precio Mensual</label>
            <input type="number" step="0.01" th:field="*{precioMensual}">
            
            <label>Estado</label>
            <select th:field="*{estado}">
                <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
            </select>
            
            <div class="botones-container" style="margin-top: 20px;">
                <button type="submit">Guardar</button>
                <a class="boton" th:href="@{/publicaciones/buscar}">Volver</a>
            </div>
        </form>
    </div>

</body>
</html>
