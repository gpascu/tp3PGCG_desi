<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PGCG - Formulario de Publicación</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        /* Estilos complementarios para mejorar la disposición de los textareas */
        .form-grupo {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        .form-grupo label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-grupo input, .form-grupo select, .form-grupo textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 14px;
        }
        .botones-container {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>
    <div th:replace="fragments/menu :: menu"></div>

    <div class="contenedor" style="max-width: 700px; margin: 30px auto; padding: 20px;">
        <h1>Formulario de Publicaciones</h1>
        
        <div class="mensaje error" th:if="${error}" th:text="${error}" 
             style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 15px;">
        </div>
        
        <form th:action="@{/publicaciones/guardar}" th:object="${publicacionesform}" method="post">
            
            <input type="hidden" th:field="*{id}">
            
            <div class="form-grupo" th:if="*{id != null}">
                <label>Identificador</label>
                <input type="text" th:field="*{id}" readonly style="background-color: #e9ecef;">
            </div>
            
            <div class="form-grupo">
                <label for="selectPropiedad">Propiedad Asociada</label>
                <!-- ALTA: selector de propiedad -->
                <select th:if="*{id == null}" th:field="*{propiedad.id}" id="selectPropiedad" required>
                    <option value="" disabled selected>-- Seleccione una propiedad --</option>
                    <option th:each="prop : ${propiedadesDisponibles}"
                            th:value="${prop.id}"
                            th:text="'[ID: ' + ${prop.id} + '] ' + ${prop.direccion}"
                            th:data-direccion="${prop.direccion}"
                            th:data-ciudad="${prop.ciudad != null ? prop.ciudad.nombre : 'No especificada'}"
                            th:data-tipo="${prop.tipo}"
                            th:data-metros="${prop.metrosCuadrados}"
                            th:data-ambientes="${prop.cantidadAmbientes}"
                            th:data-descripcion="${prop.descripcion}"
                            th:data-comodidades="${prop.comodidades}">
                    </option>
                </select>
                <!-- EDICIÓN: la propiedad no se cambia -->
                <span th:if="*{id != null}"
                      th:text="${publicacionesform.propiedad != null ? '[ID: ' + publicacionesform.propiedad.id + '] ' + publicacionesform.propiedad.direccion : ''}">
                </span>
                <input type="hidden" th:if="*{id != null}" th:field="*{propiedad.id}">
            </div>
            
            <div class="form-grupo">
                <label for="condicionesPublicacion">Condiciones de la Publicación</label>
                <textarea th:field="*{condiciones}" id="condicionesPublicacion" rows="4" 
                          placeholder=""></textarea>
            </div>
            
            <div class="form-grupo">
                <label for="descripcionPublicacion">Descripción de la Publicación</label>
                <textarea th:field="*{descripcion}" id="descripcionPublicacion" rows="8" 
                          placeholder="Aquí se autocompletarán el tipo, metros, ambientes y detalles..."></textarea>
            </div>
            
            <div class="form-grupo">
                <label>Fecha de Publicación</label>
                <input type="date" th:field="*{fechaPublicacion}" required>
            </div>
            
            <div class="form-grupo">
                <label>Precio Mensual</label>
                <input type="number" step="0.01" th:field="*{precioMensual}" required placeholder="0.00">
            </div>
            
            <div class="form-grupo">
                <label>Estado Inicial</label>
                <select th:field="*{estado}" required>
                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                </select>
            </div>
            
            <div class="acciones-form">
                <button type="submit">Guardar</button>
                <a class="boton" th:href="@{/publicaciones}">Volver</a>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function() {
            const selectPropiedad = document.getElementById("selectPropiedad");
            const txtDescripcion = document.getElementById("descripcionPublicacion");

            // En edición no existe el selector de propiedad: no hay nada que autocompletar
            if (!selectPropiedad) {
                return;
            }

            selectPropiedad.addEventListener("change", function() {
                // Captura la opción que el usuario seleccionó actualmente
                const opcionSeleccionada = selectPropiedad.options[selectPropiedad.selectedIndex];
                
                if (opcionSeleccionada && opcionSeleccionada.value !== "") {
                    // Extraemos las variables inyectadas en las propiedades personalizados data-*
                    const direccion = opcionSeleccionada.getAttribute("data-direccion") || '';
                    const ciudad = opcionSeleccionada.getAttribute("data-ciudad") || '';
                    const tipo = opcionSeleccionada.getAttribute("data-tipo") || '';
                    const metros = opcionSeleccionada.getAttribute("data-metros") || '';
                    const ambientes = opcionSeleccionada.getAttribute("data-ambientes") || '';
                    const descripcionProp = opcionSeleccionada.getAttribute("data-descripcion") || '';
                    const comodidades = opcionSeleccionada.getAttribute("data-comodidades") || '';



                    // 2. Estructuramos la información destinada al cuadro de Descripción
                    const textoDescripcion =
`Dirección: ${direccion}
Ciudad: ${ciudad}
Comodidades: ${comodidades} 
Tipo de Propiedad: ${tipo}
Metros Cuadrados: ${metros} m²
Cantidad de Ambientes: ${ambientes}
Descripción: ${descripcionProp}`;

                    // Inyectamos los textos formateados en los respectivos Textareas del formulario
                   
                    txtDescripcion.value = textoDescripcion;
                } else {
                    // Si por algún motivo vuelven a la opción por defecto, limpiamos los campos
                   
                    txtDescripcion.value = "";
                }
            });
        });
    </script>
</body>
</html>
