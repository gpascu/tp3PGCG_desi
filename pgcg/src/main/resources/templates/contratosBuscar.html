<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PGCG Inmobiliaria - Contratos</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>

    <div th:replace="fragments/menu :: menu"></div>

    <div class="contenedor">

        <h1 class="titulo-con-label">Contratos</h1>

        <div class="mensaje ok"
             th:if="${ok}"
             th:text="${ok}">
        </div>

        <div class="mensaje error"
             th:if="${error}"
             th:text="${error}">
        </div>

        <form method="post" th:action="@{/contratos}" th:object="${formBusqueda}">

            <select th:field="*{propiedadId}">
                <option value="">Propiedad</option>
                <option th:each="p : ${propiedades}"
                        th:value="${p.id}"
                        th:text="${p.direccion}">
                </option>
            </select>

            <select th:field="*{inquilinoId}">
                <option value="">Inquilino</option>
                <option th:each="i : ${inquilinos}"
                        th:value="${i.id}"
                        th:text="${i.nombreCompleto}">
                </option>
            </select>

            <select th:field="*{estado}">
                <option value="">Estado</option>
                <option th:each="e : ${estados}"
                        th:value="${e}"
                        th:text="${e}">
                </option>
            </select>

            <div class="filtro-fecha">
                <label for="fechaInicioBusqueda">Fecha Inicio</label>
                <input type="date"
                       th:field="*{fechaInicio}"
                       id="fechaInicioBusqueda">
            </div>

            <button type="submit">
                Buscar
            </button>

            <a class="boton nuevoItem"
               th:href="@{/contratos/nuevo}">
                Nuevo contrato
            </a>

        </form>

        <table class="tabla-responsive">

            <tr>
                <th>ID</th>
                <th>Propiedad</th>
                <th>Propietario</th>
                <th>Inquilino</th>
                <th>Fecha Inicio</th>
                <th>Importe</th>
                <th>Vencimiento</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>

            <tr th:each="c : ${lista}">

                <td th:text="${c.id}"></td>

                <td th:text="${c.propiedad != null ? c.propiedad.direccion : 'N/A'}"></td>

                <td th:text="${c.propiedad != null && c.propiedad.propietario != null ? c.propiedad.propietario.nombreCompleto : 'N/A'}"></td>

                <td th:text="${c.inquilino != null ? c.inquilino.nombreCompleto : 'N/A'}"></td>

                <td th:text="${#temporals.format(c.fechaInicio, 'dd-MM-yyyy')}"></td>

                <td th:text="${'$' + c.importeMensual}"></td>

                <td th:text="${c.diaVencimientoMensual}"></td>

                <td th:text="${c.estado}"></td>

                <td>

                    <div class="acciones">

                        <div class="accion-item">

                            <a class="boton boton-historial"
                               th:href="@{/contratos/{id}/historial-estados(id=${c.id})}"
                               title="Historial de estados">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: block;">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                            </a>

                        </div>

                        <div class="accion-item">

                            <a class="boton boton-editar"
                               th:href="@{/contratos/editar/{id}(id=${c.id})}">
                                Editar
                            </a>

                        </div>

                        <div class="accion-item">

                            <form th:action="@{/contratos/eliminar/{id}(id=${c.id})}"
                                  method="post">

                                <button type="submit"
                                        class="boton-eliminar">
                                    Eliminar
                                </button>

                            </form>

                        </div>

                    </div>

                </td>

            </tr>

        </table>

    </div>

</body>

</html>
