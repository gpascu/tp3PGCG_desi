<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Publicaciones</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Publicaciones Activas</h2>
        <a th:href="@{/publicaciones/nuevo}" class="btn btn-primary">Nueva Publicación</a>
    </div>
    
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Descripción</th>
                <th>Precio Mensual</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="pub : ${listaPublicaciones}">
                <td th:text="${pub.id}"></td>
                <td th:text="${pub.titulo}"></td>
                <td th:text="${pub.descripcion}"></td>
                <td th:text="${'$' + pub.precioMensual}"></td>
                <td>
                    <a th:href="@{/publicaciones/eliminar/{id}(id=${pub.id})}" 
                       class="btn btn-danger btn-sm" 
                       onclick="return confirm('¿Está seguro de dar de baja esta publicación?');">
                       Dar de Baja
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(listaPublicaciones)}">
                <td colspan="5" class="text-center text-muted">No hay publicaciones activas registradas.</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
